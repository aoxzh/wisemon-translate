<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Icons for Wisemon</title>
  <style>
    body { font-family: sans-serif; padding: 40px; text-align: center; }
    canvas { display: none; }
    .btn { padding: 10px 20px; margin: 8px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Icon Generator</h1>
  <p>Click each button to download the icon PNG for the extension.</p>
  <canvas id="c16" width="16" height="16"></canvas>
  <canvas id="c48" width="48" height="48"></canvas>
  <canvas id="c128" width="128" height="128"></canvas>
  <br>
  <button class="btn" onclick="downloadIcon(16)">Download 16x16</button>
  <button class="btn" onclick="downloadIcon(48)">Download 48x48</button>
  <button class="btn" onclick="downloadIcon(128)">Download 128x128</button>

  <script>
    function drawIcon(size) {
      const canvas = document.getElementById('c' + size);
      const ctx = canvas.getContext('2d');
      const r = size * 0.15;
      ctx.clearRect(0, 0, size, size);

      // Background rounded rect
      ctx.fillStyle = '#6495ED';
      roundRect(ctx, 0, 0, size, size, r);
      ctx.fill();

      // "T" text
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${size * 0.65}px sans-serif`;
      ctx.fillText('T', size / 2, size / 2 + size * 0.05);

      return canvas;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function downloadIcon(size) {
      drawIcon(size);
      const canvas = document.getElementById('c' + size);
      const link = document.createElement('a');
      link.download = 'icon' + size + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
