<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Editor Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px auto; max-width: 760px; }
    #editor {
      min-height: 140px;
      border: 1px solid #cfd6df;
      border-radius: 12px;
      padding: 16px;
      outline: none;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Rich Editor Fixture</h1>
  <div id="editor" contenteditable="true">Translate this editable paragraph into another language.</div>
</body>
