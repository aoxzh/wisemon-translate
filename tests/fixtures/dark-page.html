<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Page Fixture</title>
  <style>
    html, body { background: #101418; color: #eef3f7; font-family: system-ui, sans-serif; }
    main { max-width: 720px; margin: 48px auto; }
    article { background: #161c22; padding: 24px; }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>Dark reading page</h1>
      <p id="dark-paragraph">This dark themed article should keep translated text readable without relying on the operating system color scheme.</p>
    </article>
  </main>
</body>
</html>
