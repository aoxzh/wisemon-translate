<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow DOM Fixture</title>
</head>
<body>
  <h1>Shadow DOM Fixture</h1>
  <div id="shadow-host"></div>
  <script>
    const host = document.getElementById('shadow-host');
    const root = host.attachShadow({ mode: 'open' });
    root.innerHTML = `
      <style>
        .card { border: 1px solid #cfd6df; border-radius: 10px; padding: 16px; font-family: system-ui, sans-serif; }
      </style>
      <div class="card">
        <p id="shadow-text">Shadow content should be discovered and translated without breaking the host page.</p>
      </div>
    `;
  </script>
</body>
</html>
